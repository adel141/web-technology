<!DOCTYPE html>
<head>
    <title>Text Analysis Tool</title>

    <style>
        body {
            background: #f4f4f4;
            padding: 40px;
            width: 700px;
            margin: 0 auto;
        }

        .container {
            background: #fff;
            padding: 20px;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 150px;
            margin: 0 auto;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: seagreen;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: lightseagreen;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid #007BFF;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Text Analysis Tool</h2>

    <textarea id="inputText" placeholder="Paste your text here..."></textarea>

    <button onclick="analyzeText()">Analyze Text</button>

    <div class="result"> <p id="result"></p></div>
</div>

<script>
function analyzeText() {
    let text = document.getElementById("inputText").value;
    let resultPara = document.getElementById("result");

</script>

</body>
</html>
