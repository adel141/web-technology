<!doctype html>
<html>
    <head>
        <title>Simple Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>

    </head>

    <body>
        <div id="calculator">
        
            <div id="display">
                <div id="input"></div>
                <div id="result"></div>
            </div>

            <div id="cal_body">
                <button class="btn" id="num7" onclick="appendDisplay('7')">7</button>
                <button class="btn" id="num8" onclick="appendDisplay('8')">8</button>
                <button class="btn" id="num9" onclick="appendDisplay('9')">9</button>
                <button class="btn operator" id="divide" onclick="appendDisplay('/')">/</button>

                <button class="btn" id="num4" onclick="appendDisplay('4')">4</button>
                <button class="btn" id="num5" onclick="appendDisplay('5')">5</button>
                <button class="btn" id="num6" onclick="appendDisplay('6')">6</button>
                <button class="btn operator" id="multiply" onclick="appendDisplay('*')">*</button>

                <button class="btn" id="num1" onclick="appendDisplay('1')">1</button>
                <button class="btn" id="num2" onclick="appendDisplay('2')">2</button>
                <button class="btn" id="num3" onclick="appendDisplay('3')">3</button>
                <button class="btn operator" id="subtract" onclick="appendDisplay('-')">-</button>

                <button class="btn" id="num0" onclick="appendDisplay('0')">0</button>
                <button class="btn clear" id="clear" onclick="clearDisplay()">C</button>
                <button class="btn equal" id="equals" onclick="calculate()">=</button>
                <button class="btn operator" id="add" onclick="appendDisplay('+')">+</button>
            </div>

        </div>
    </body>
</html>
